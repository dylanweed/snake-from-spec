<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake (NES)</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
      }
      #screen {
        width: 512px;
        max-width: 90vw;
        background: #000;
        border: 2px solid #444;
      }
      #screen canvas {
        width: 100%;
        image-rendering: pixelated;
      }
      #status {
        font-size: 1rem;
        color: #aaa;
      }
      #instructions {
        font-size: 0.9rem;
        color: #aaa;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 style="font-size: 1.1rem; margin: 0;">Snake (NES)</h1>
      <div id="screen"><span id="status">Loading ROM...</span></div>
      <div id="instructions">
        Arrow keys to steer &middot; Enter (Start) to restart<br />
        A real 6502 ROM, assembled with cc65 and run in the browser via the jsnes emulator.
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
